<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oakcraft — Kitting Management System</title>
  <style>
/* ============================================================
   Oakcraft Kitting Management System — styles
   Design tokens follow the validated reference dataviz palette.
   ============================================================ */

:root {
  color-scheme: light;
  --page: #f9f9f7;
  --surface: #fcfcfb;
  --ink: #0b0b0b;
  --ink-2: #52514e;
  --muted: #898781;
  --grid: #e1e0d9;
  --baseline: #c3c2b7;
  --ring: rgba(11, 11, 11, 0.10);

  --s1: #2a78d6;  /* series blue   */
  --s2: #eb6834;  /* series orange */
  --s3: #1baf7a;  /* series aqua   */

  --good: #0ca30c;
  --warning: #fab219;
  --serious: #ec835a;
  --critical: #d03b3b;
  --good-text: #006300;

  --brand: #104281;
  --brand-2: #1c5cab;
  --sidebar-bg: #0d1b2e;
  --sidebar-ink: #c9d4e3;

  --radius: 10px;
  --shadow: 0 1px 3px rgba(11,11,11,.06), 0 4px 14px rgba(11,11,11,.05);
}

:root[data-theme="dark"] {
  color-scheme: dark;
  --page: #0d0d0d;
  --surface: #1a1a19;
  --ink: #ffffff;
  --ink-2: #c3c2b7;
  --muted: #898781;
  --grid: #2c2c2a;
  --baseline: #383835;
  --ring: rgba(255, 255, 255, 0.10);

  --s1: #3987e5;
  --s2: #d95926;
  --s3: #199e70;

  --good-text: #0ca30c;
  --brand: #184f95;
  --brand-2: #3987e5;
  --sidebar-bg: #101418;
  --shadow: none;
}

* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0;
  font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
  background: var(--page);
  color: var(--ink);
  font-size: 14px;
}

/* ---------------- layout ---------------- */
.app { display: flex; min-height: 100vh; }

.sidebar {
  width: 232px; flex-shrink: 0;
  background: var(--sidebar-bg); color: var(--sidebar-ink);
  display: flex; flex-direction: column;
  position: sticky; top: 0; height: 100vh;
}
.brand { padding: 20px 18px 14px; border-bottom: 1px solid rgba(255,255,255,.08); }
.brand .logo { font-weight: 700; font-size: 16px; color: #fff; letter-spacing: .2px; }
.brand .tag { font-size: 11px; color: #7f93ad; margin-top: 2px; }

.nav { padding: 10px 8px; flex: 1; overflow-y: auto; }
.nav button {
  display: flex; align-items: center; gap: 10px;
  width: 100%; text-align: left;
  background: none; border: 0; color: var(--sidebar-ink);
  font: inherit; font-size: 13.5px;
  padding: 10px 12px; border-radius: 8px; cursor: pointer; margin-bottom: 2px;
}
.nav button:hover { background: rgba(255,255,255,.07); color: #fff; }
.nav button.active { background: var(--brand-2); color: #fff; font-weight: 600; }
.nav .icon { width: 18px; text-align: center; font-size: 15px; }
.nav .count {
  margin-left: auto; background: rgba(255,255,255,.14); color: #fff;
  border-radius: 20px; font-size: 11px; padding: 1px 8px; font-variant-numeric: tabular-nums;
}
.sidebar .foot { padding: 12px 18px; font-size: 11px; color: #66788f; border-top: 1px solid rgba(255,255,255,.08); }

.main { flex: 1; min-width: 0; display: flex; flex-direction: column; }

.topbar {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 22px; background: var(--surface);
  border-bottom: 1px solid var(--grid);
  position: sticky; top: 0; z-index: 30;
}
.topbar h1 { font-size: 16px; margin: 0; font-weight: 650; }
.topbar .spacer { flex: 1; }
.searchbox { position: relative; }
.searchbox input {
  width: 300px; max-width: 40vw;
  padding: 8px 12px 8px 32px; border: 1px solid var(--grid); border-radius: 8px;
  background: var(--page); color: var(--ink); font: inherit;
}
.searchbox::before { content: "\1F50D"; position: absolute; left: 10px; top: 8px; font-size: 12px; opacity: .55; }
.sync { font-size: 11.5px; color: var(--muted); white-space: nowrap; }

.content { padding: 20px 22px 60px; }

/* ---------------- cards & panels ---------------- */
.card {
  background: var(--surface); border: 1px solid var(--ring);
  border-radius: var(--radius); box-shadow: var(--shadow);
  padding: 16px 18px; margin-bottom: 16px;
}
.card h2 { font-size: 14px; margin: 0 0 12px; font-weight: 650; }
.card h2 .sub { font-weight: 400; color: var(--muted); font-size: 12px; margin-left: 8px; }

.grid { display: grid; gap: 14px; }
.grid.cols-2 { grid-template-columns: 1fr 1fr; }
.grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
.grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
@media (max-width: 1100px) { .grid.cols-4 { grid-template-columns: 1fr 1fr; } .grid.cols-3 { grid-template-columns: 1fr 1fr; } }
@media (max-width: 760px)  { .grid.cols-2, .grid.cols-3, .grid.cols-4 { grid-template-columns: 1fr; } }

/* stat tiles */
.stat { padding: 14px 16px; }
.stat .label { font-size: 12px; color: var(--ink-2); display: flex; align-items: center; gap: 8px; }
.stat .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.stat .value { font-size: 27px; font-weight: 700; margin-top: 6px; }
.stat .hint { font-size: 11.5px; color: var(--muted); margin-top: 4px; }

/* ---------------- tables ---------------- */
.tablewrap { overflow-x: auto; }
table.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.tbl th {
  text-align: left; font-weight: 600; font-size: 11.5px; text-transform: uppercase; letter-spacing: .04em;
  color: var(--muted); padding: 8px 10px; border-bottom: 1px solid var(--baseline);
  white-space: nowrap; cursor: pointer; user-select: none;
}
.tbl th .arrow { font-size: 9px; margin-left: 3px; }
.tbl td { padding: 9px 10px; border-bottom: 1px solid var(--grid); vertical-align: middle; }
.tbl tr:hover td { background: color-mix(in srgb, var(--s1) 5%, transparent); }
.tbl td.num, .tbl th.num { text-align: right; font-variant-numeric: tabular-nums; }
.tbl .rowactions { white-space: nowrap; text-align: right; }
.empty { text-align: center; color: var(--muted); padding: 32px 10px; font-size: 13px; }

/* ---------------- pills / badges ---------------- */
.pill {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11.5px; font-weight: 600; padding: 2px 10px; border-radius: 20px;
  white-space: nowrap;
}
.pill::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.pill-good { color: var(--good-text); background: color-mix(in srgb, var(--good) 14%, transparent); }
.pill-warn { color: #8a5a00; background: color-mix(in srgb, var(--warning) 20%, transparent); }
:root[data-theme="dark"] .pill-warn { color: var(--warning); }
.pill-bad  { color: var(--critical); background: color-mix(in srgb, var(--critical) 12%, transparent); }
.pill-info { color: var(--brand-2); background: color-mix(in srgb, var(--s1) 12%, transparent); }
.pill-muted { color: var(--muted); background: color-mix(in srgb, var(--muted) 14%, transparent); }

.kit-complete { color: var(--good-text); font-weight: 700; }
.kit-pending { color: var(--critical); font-weight: 700; }

/* coverage meter */
.meter { background: var(--grid); border-radius: 6px; height: 8px; width: 110px; display: inline-block; vertical-align: middle; overflow: hidden; }
.meter > span { display: block; height: 100%; background: var(--s1); border-radius: 6px; }
.meter.full > span { background: var(--good); }

/* ---------------- forms ---------------- */
.frm { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px 14px; }
@media (max-width: 900px) { .frm { grid-template-columns: 1fr 1fr; } }
@media (max-width: 620px) { .frm { grid-template-columns: 1fr; } }
.field label { display: block; font-size: 12px; color: var(--ink-2); margin-bottom: 5px; font-weight: 600; }
.field input, .field select, .field textarea {
  width: 100%; padding: 8px 10px; border: 1px solid var(--baseline); border-radius: 8px;
  background: var(--surface); color: var(--ink); font: inherit;
}
.field input:focus, .field select:focus, .field textarea:focus {
  outline: 2px solid color-mix(in srgb, var(--s1) 55%, transparent); border-color: var(--s1);
}
.field.span2 { grid-column: span 2; }
.field.span3 { grid-column: 1 / -1; }
.formactions { grid-column: 1 / -1; display: flex; gap: 10px; margin-top: 4px; flex-wrap: wrap; }

/* ---------------- buttons ---------------- */
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  font: inherit; font-size: 13px; font-weight: 600;
  padding: 8px 14px; border-radius: 8px; cursor: pointer;
  border: 1px solid var(--baseline); background: var(--surface); color: var(--ink);
}
.btn:hover { border-color: var(--ink-2); }
.btn:disabled { opacity: .5; cursor: not-allowed; }
.btn-primary { background: var(--brand-2); border-color: var(--brand-2); color: #fff; }
.btn-primary:hover { background: var(--brand); border-color: var(--brand); }
.btn-danger { color: var(--critical); border-color: color-mix(in srgb, var(--critical) 45%, transparent); }
.btn-danger:hover { background: color-mix(in srgb, var(--critical) 8%, transparent); }
.btn-sm { padding: 4px 10px; font-size: 12px; border-radius: 7px; }
.btn-icon { padding: 6px 9px; }
.btn-order { background: var(--s2); border-color: var(--s2); color: #fff; }
.btn-order:hover { filter: brightness(.92); }

/* filter bar */
.filters { display: flex; gap: 10px; flex-wrap: wrap; align-items: end; margin-bottom: 14px; }
.filters .field { min-width: 150px; }
.filters .field input, .filters .field select { padding: 7px 9px; }

/* ---------------- charts ---------------- */
.chartbox { position: relative; height: 260px; }
.chartbox.tall { height: 320px; }

/* ---------------- modal ---------------- */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 90;
  display: flex; align-items: flex-start; justify-content: center; padding: 6vh 16px;
}
.modal {
  background: var(--surface); border-radius: 12px; box-shadow: 0 12px 50px rgba(0,0,0,.3);
  width: 100%; max-width: 900px; max-height: 86vh; display: flex; flex-direction: column;
}
.modal header {
  display: flex; align-items: center; padding: 14px 18px; border-bottom: 1px solid var(--grid);
}
.modal header h3 { margin: 0; font-size: 15px; }
.modal header .x { margin-left: auto; background: none; border: 0; font-size: 18px; cursor: pointer; color: var(--muted); }
.modal .body { padding: 16px 18px; overflow-y: auto; }
.modal footer { padding: 12px 18px; border-top: 1px solid var(--grid); display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap; }

/* ---------------- toasts ---------------- */
#toasts { position: fixed; bottom: 18px; right: 18px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
.toast {
  background: var(--ink); color: var(--page);
  padding: 10px 16px; border-radius: 9px; font-size: 13px; font-weight: 500;
  opacity: 0; transform: translateY(8px); transition: all .25s;
  max-width: 360px; box-shadow: 0 6px 24px rgba(0,0,0,.25);
}
.toast.show { opacity: 1; transform: none; }
.toast-good { background: var(--good-text); color: #fff; }
.toast-bad { background: var(--critical); color: #fff; }

/* ---------------- misc ---------------- */
.loading-overlay {
  position: fixed; inset: 0; background: var(--page); z-index: 300;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
}
.spinner {
  width: 34px; height: 34px; border: 3px solid var(--grid); border-top-color: var(--s1);
  border-radius: 50%; animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.hidden { display: none !important; }
.mt { margin-top: 14px; }
.muted { color: var(--muted); }
.small { font-size: 12px; }
.right { text-align: right; }
.toolrow { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
.toolrow .spacer { flex: 1; }
.notice {
  background: color-mix(in srgb, var(--warning) 14%, transparent);
  border: 1px solid color-mix(in srgb, var(--warning) 45%, transparent);
  padding: 10px 14px; border-radius: 9px; font-size: 13px; margin-bottom: 14px;
}
.setup-hint code { background: var(--grid); padding: 2px 6px; border-radius: 5px; font-size: 12px; }

/* mobile */
@media (max-width: 860px) {
  .sidebar { position: fixed; left: -240px; transition: left .2s; z-index: 100; }
  .sidebar.open { left: 0; box-shadow: 0 0 40px rgba(0,0,0,.4); }
  .hamburger { display: inline-flex !important; }
  .searchbox input { width: 160px; }
}
.hamburger { display: none; }

@media print {
  .sidebar, .topbar, .filters, .toolrow, .btn, #toasts { display: none !important; }
  .content { padding: 0; }
  .card { box-shadow: none; border: none; }
}

</style>

  <div class="loading-overlay" id="loading">
    <div class="spinner"></div>
    <div class="muted small" id="loadingMsg">Connecting to Google Sheets…</div>
  </div>

  <div class="app">
    <!-- ============ SIDEBAR ============ -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="logo">🪑 Oakcraft</div>
        <div class="tag">Kitting Management System</div>
      </div>
      <nav class="nav" id="nav">
        <button data-view="dashboard"><span class="icon">📊</span> Dashboard</button>
        <button data-view="orders"><span class="icon">🧾</span> Order Form <span class="count" id="cnt-orders">0</span></button>
        <button data-view="bom"><span class="icon">🧩</span> Kitting Master <span class="count" id="cnt-bom">0</span></button>
        <button data-view="fg"><span class="icon">🏭</span> FG Status</button>
        <button data-view="inventory"><span class="icon">📦</span> Live Inventory <span class="count" id="cnt-inv">0</span></button>
        <button data-view="kitting"><span class="icon">✅</span> Full Kitting Status</button>

    <!-- ============ MAIN ============ -->
    <div class="main">
      <div class="topbar">
        <button class="btn btn-icon hamburger" id="hamburger">☰</button>

        <div class="spacer"></div>
        <div class="searchbox"><input id="globalSearch" type="search" placeholder="Search orders, materials, products…" /></div>
        <span class="sync" id="syncInfo">—</span>
        <button class="btn btn-icon" id="refreshBtn" title="Refresh from Google Sheets">⟳</button>

  <script>

/* ========== config.js ========== */
/* ============================================================
   CONFIG — the ONLY file you must edit after deployment
   ============================================================ */
window.KMS_CONFIG = {
  // 1. Deploy backend/Code.gs as a Web App (Anyone can access)
  // 2. Paste the Web App URL here (ends with /exec)
  API_URL: 'https://script.google.com/macros/s/AKfycbyUlW3TGaFK4oTjmceZ1QTcqdlNKW4R5d0XGvYNbtUiFPM-XloAvu8srbwupl4y2XK2Bg/exec',

  // Background auto-sync interval (milliseconds).
  // NOTE: your own saves/edits/deletes sync to Google Sheets INSTANTLY —
  // this timer only picks up changes made by OTHER users or directly in the sheet.
  REFRESH_MS: 20000,

  // Company details used on screen + PDF headers
  COMPANY_NAME: 'Oakcraft Furniture',
  COMPANY_TAGLINE: 'Kitting Management System',

  // Dropdown option lists (edit freely)
  CATEGORIES: ['Chair', 'Sofa', 'Wardrobe (Almirah)', 'Recliner Chair', 'Recliner Sofa', 'Bed', 'Table', 'Other'],
  UNITS: ['PCS', 'MTR', 'KG', 'SET', 'PAIR', 'ROLL', 'LTR', 'SQFT', 'BOX'],
  ORDER_STATUSES: ['Open', 'In Production', 'Ready', 'Dispatched', 'Delivered', 'Cancelled'],
  PRIORITIES: ['Low', 'Normal', 'High', 'Urgent'],
  PR_STATUSES: ['Pending', 'Approved', 'Ordered', 'Received', 'Cancelled']
};

/* ========== api.js ========== */
/* ============================================================
   API — talks to the Google Apps Script backend
   Writes use POST with a text/plain body (avoids CORS preflight).
   ============================================================ */
window.API = (function () {
  var cfg = window.KMS_CONFIG;

  function assertConfigured() {
    if (!cfg.API_URL || cfg.API_URL.indexOf('https://') !== 0) {
      throw new Error('API_URL is not set. Open js/config.js and paste your Apps Script Web App URL.');
    }
  }

  async function get(action, params) {
    assertConfigured();
    var url = cfg.API_URL + '?action=' + encodeURIComponent(action);
    if (params) {
      Object.keys(params).forEach(function (k) {
        url += '&' + encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
      });
    }
    var res = await fetch(url, { method: 'GET' });
    return unwrap(await res.json());
  }

  async function post(action, payload) {
    assertConfigured();
    var res = await fetch(cfg.API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: action, payload: payload || {} })
    });
    return unwrap(await res.json());
  }

  function unwrap(json) {
    if (!json || json.ok !== true) {
      throw new Error((json && json.error) || 'Unknown server error');
    }
    return json.data;
  }

  return {
    ping: function () { return get('ping'); },
    bootstrap: function () { return get('bootstrap'); },
    // orders
    createOrder: function (o) { return post('createOrder', o); },
    updateOrder: function (o) { return post('updateOrder', o); },
    deleteOrder: function (id) { return post('deleteOrder', { orderId: id }); },
    // BOM
    saveBomItems: function (items) { return post('saveBomItems', { items: items }); },
    updateBomItem: function (item) { return post('updateBomItem', item); },
    deleteBomItem: function (id) { return post('deleteBomItem', { bomId: id }); },
    // inventory
    getInventory: function () { return get('getInventory'); },
    // purchase requirements
    createPR: function (p) { return post('createPR', p); },
    updatePRStatus: function (prNumber, status) { return post('updatePRStatus', { prNumber: prNumber, status: status }); },
    deletePR: function (prNumber) { return post('deletePR', { prNumber: prNumber }); },
    // settings
    saveSettings: function (settings) { return post('saveSettings', { settings: settings }); }
  };
})();

/* ========== utils.js ========== */
/* ============================================================
   UTILS — formatting, toasts, exports (Excel / PDF / Print)
   ============================================================ */
window.U = (function () {

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function num(v) { var n = Number(v); return isNaN(n) ? 0 : n; }

  function fmtQty(v) {
    var n = num(v);
    return (n % 1 === 0) ? n.toLocaleString('en-IN') : n.toLocaleString('en-IN', { maximumFractionDigits: 2 });
  }

  function fmtDate(v) {
    if (!v) return '';
    var d = new Date(v);
    if (isNaN(d.getTime())) return String(v);
    return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  function todayISO() {
    var d = new Date();
    return d.getFullYear() + '-' + ('0' + (d.getMonth() + 1)).slice(-2) + '-' + ('0' + d.getDate()).slice(-2);
  }

  function debounce(fn, ms) {
    var t;
    return function () {
      var args = arguments, ctx = this;
      clearTimeout(t);
      t = setTimeout(function () { fn.apply(ctx, args); }, ms);
    };
  }

  /* ---------- toasts ---------- */
  function toast(msg, type) {
    var el = document.createElement('div');
    el.className = 'toast toast-' + (type || 'info');
    el.textContent = msg;
    document.getElementById('toasts').appendChild(el);
    setTimeout(function () { el.classList.add('show'); }, 10);
    setTimeout(function () {
      el.classList.remove('show');
      setTimeout(function () { el.remove(); }, 300);
    }, 3500);
  }

  /* ---------- status pills ---------- */
  function pill(text, kind) {
    return '<span class="pill pill-' + kind + '">' + esc(text) + '</span>';
  }

  function orderStatusPill(status) {
    var map = { 'Open': 'info', 'In Production': 'warn', 'Ready': 'good', 'Dispatched': 'info', 'Delivered': 'good', 'Cancelled': 'bad' };
    return pill(status, map[status] || 'muted');
  }

  function prStatusPill(status) {
    var map = { 'Pending': 'warn', 'Approved': 'info', 'Ordered': 'info', 'Received': 'good', 'Cancelled': 'bad' };
    return pill(status, map[status] || 'muted');
  }

  /* ---------- Excel export (SheetJS) ---------- */
  function exportExcel(filename, sheetsSpec) {
    // sheetsSpec: [{name, headers:[], rows:[[..],..]}]
    var wb = XLSX.utils.book_new();
    sheetsSpec.forEach(function (s) {
      var aoa = [s.headers].concat(s.rows);
      var ws = XLSX.utils.aoa_to_sheet(aoa);
      ws['!cols'] = s.headers.map(function (h, i) {
        var w = String(h).length;
        s.rows.forEach(function (r) { w = Math.max(w, String(r[i] == null ? '' : r[i]).length); });
        return { wch: Math.min(w + 2, 40) };
      });
      XLSX.utils.book_append_sheet(wb, ws, s.name.substring(0, 31));
    });
    XLSX.writeFile(wb, filename);
  }

      '</style></head><body>' + bodyHTML +

    );

  return {

    debounce: debounce, toast: toast, pill: pill,
    orderStatusPill: orderStatusPill, prStatusPill: prStatusPill,
    exportExcel: exportExcel, pdfDoc: pdfDoc, pdfTable: pdfTable, pdfFooter: pdfFooter,
    printHTML: printHTML
  };
})();

/* ========== engine.js ========== */
/* ============================================================
   ENGINE — the kitting brain (pure functions, no DOM, no I/O)
   - FG requirement calculation   (order × BOM)
   - Full-kitting status          (requirement vs live stock)
   - Shortage lists               (for Purchase Requirements)
   ============================================================ */
window.ENGINE = (function () {

  function n(v) { var x = Number(v); return isNaN(x) ? 0 : x; }

  /** Map of Material Code -> inventory row */
  function inventoryMap(inventory) {
    var map = {};
    (inventory || []).forEach(function (r) {
      map[String(r['Material Code']).trim().toUpperCase()] = r;
    });
    return map;
  }

  /** BOM lines for one product (matched by Product Name, case-insensitive). */
  function bomForProduct(bom, productName) {
    var key = String(productName || '').trim().toLowerCase();
    return (bom || []).filter(function (b) {
      return String(b['Product Name'] || '').trim().toLowerCase() === key;
    });
  }

  /**
   * FG requirement for one order.
   * Returns [{materialCode, materialName, requiredQty, unit, productName, orderId}]
   */
  function orderRequirements(order, bom) {
    var qty = n(order['Quantity']);
    return bomForProduct(bom, order['Product Name']).map(function (b) {
      return {
        orderId: order['Order ID'],
        productName: order['Product Name'],
        materialCode: String(b['Raw Material Code'] || '').trim(),
        materialName: b['Raw Material Name'] || '',
        perUnit: n(b['Qty Per Unit']),
        requiredQty: n(b['Qty Per Unit']) * qty,
        unit: b['Unit'] || ''
      };
    });
  }

  /** Orders that count for kitting (not delivered / cancelled). */
  function activeOrders(orders) {
    return (orders || []).filter(function (o) {
      var s = String(o['Order Status'] || '');
      return s !== 'Delivered' && s !== 'Cancelled';
    });
  }

  /**
   * Kitting evaluation of one order against live stock.
   * Returns {
   *   status: 'COMPLETE' | 'PENDING' | 'NO_BOM',
   *   lines: [{...requirement, availableQty, shortageQty, ok}],
   *   shortages: [...lines where shortage > 0],
   *   coverage: 0..100  (percent of BOM lines fully available)
   * }
   */
  function evaluateOrder(order, bom, invMap) {
    var reqs = orderRequirements(order, bom);
    if (!reqs.length) return { status: 'NO_BOM', lines: [], shortages: [], coverage: 0 };

    var okCount = 0;
    var lines = reqs.map(function (r) {
      var inv = invMap[r.materialCode.toUpperCase()];
      var avail = inv ? n(inv['Available Qty']) : 0;
      var shortage = Math.max(0, r.requiredQty - avail);
      var ok = shortage <= 0;
      if (ok) okCount++;
      return {
        orderId: r.orderId, productName: r.productName,
        materialCode: r.materialCode, materialName: r.materialName || (inv ? inv['Material Name'] : ''),
        perUnit: r.perUnit, requiredQty: r.requiredQty,
        availableQty: avail, shortageQty: shortage,
        unit: r.unit || (inv ? inv['Unit'] : ''), ok: ok, inStockRecord: !!inv
      };
    });

    var shortages = lines.filter(function (l) { return !l.ok; });
    return {
      status: shortages.length ? 'PENDING' : 'COMPLETE',
      lines: lines,
      shortages: shortages,
      coverage: Math.round((okCount / lines.length) * 100)
    };
  }

  /** Evaluate every active order. Returns [{order, result}] */
  function evaluateAll(orders, bom, inventory) {
    var invMap = inventoryMap(inventory);
    return activeOrders(orders).map(function (o) {
      return { order: o, result: evaluateOrder(o, bom, invMap) };
    });
  }

  /**
   * Aggregate shortages across the given evaluations, merged by material code.
   * Returns [{materialCode, materialName, unit, requiredQty, availableQty, shortageQty, orders:[...], products:[...]}]
   */
  function aggregateShortages(evaluations) {
    var agg = {};
    evaluations.forEach(function (ev) {
      ev.result.shortages.forEach(function (s) {
        var key = s.materialCode.toUpperCase();
        if (!agg[key]) {
          agg[key] = {
            materialCode: s.materialCode, materialName: s.materialName, unit: s.unit,
            requiredQty: 0, availableQty: s.availableQty, shortageQty: 0,
            orders: [], products: []
          };
        }
        agg[key].requiredQty += s.requiredQty;
        agg[key].shortageQty += s.shortageQty;
        if (agg[key].orders.indexOf(s.orderId) === -1) agg[key].orders.push(s.orderId);
        if (agg[key].products.indexOf(s.productName) === -1) agg[key].products.push(s.productName);
      });
    });
    return Object.keys(agg).map(function (k) { return agg[k]; })
      .sort(function (a, b) { return b.shortageQty - a.shortageQty; });
  }

  /**
   * Total raw-material consumption implied by orders (for reports),
   * merged by material, optionally filtered by a predicate on the order.
   */
  function consumption(orders, bom, filterFn) {
    var agg = {};
    (orders || []).forEach(function (o) {
      if (filterFn && !filterFn(o)) return;
      orderRequirements(o, bom).forEach(function (r) {
        var key = r.materialCode.toUpperCase();
        if (!agg[key]) agg[key] = { materialCode: r.materialCode, materialName: r.materialName, unit: r.unit, qty: 0 };
        agg[key].qty += r.requiredQty;
      });
    });
    return Object.keys(agg).map(function (k) { return agg[k]; })
      .sort(function (a, b) { return b.qty - a.qty; });
  }

  /** Distinct product list from BOM: [{category, product, lineCount}] */
  function bomProducts(bom) {
    var map = {};
    (bom || []).forEach(function (b) {
      var key = String(b['Product Name'] || '').trim().toLowerCase();
      if (!map[key]) map[key] = { category: b['Product Category'] || '', product: b['Product Name'] || '', lineCount: 0 };
      map[key].lineCount++;
    });
    return Object.keys(map).map(function (k) { return map[k]; })
      .sort(function (a, b) { return a.product.localeCompare(b.product); });
  }

  return {
    inventoryMap: inventoryMap,
    bomForProduct: bomForProduct,
    orderRequirements: orderRequirements,
    activeOrders: activeOrders,
    evaluateOrder: evaluateOrder,
    evaluateAll: evaluateAll,
    aggregateShortages: aggregateShortages,
    consumption: consumption,
    bomProducts: bomProducts
  };
})();

/* ========== views.js ========== */
/* ============================================================
   VIEWS — renders every tab. Pure DOM generation from APP.state.
   ============================================================ */
window.VIEWS = (function () {
  var cfg = window.KMS_CONFIG;

  /* ================= shared helpers ================= */

  function D() { return APP.state.data; }
  function S() { return (APP.state.search || '').toLowerCase(); }

  function matchesSearch(obj, fields) {
    var q = S();
    if (!q) return true;
    return fields.some(function (f) {
      return String(obj[f] == null ? '' : obj[f]).toLowerCase().indexOf(q) !== -1;
    });
  }

  function el(html) {
    var t = document.createElement('template');
    t.innerHTML = html.trim();
    return t.content.firstElementChild;
  }

  function options(list, selected) {
    return list.map(function (v) {
      return '<option value="' + U.esc(v) + '"' + (v === selected ? ' selected' : '') + '>' + U.esc(v) + '</option>';
    }).join('');
  }

  /** Make a table sortable by clicking headers. */
  function makeSortable(table) {
    var ths = table.querySelectorAll('th[data-sort]');
    ths.forEach(function (th, idx) {
      th.addEventListener('click', function () {
        var tbody = table.querySelector('tbody');
        var rows = Array.prototype.slice.call(tbody.querySelectorAll('tr'));
        var col = Array.prototype.indexOf.call(th.parentNode.children, th);
        var dir = th.dataset.dir === 'asc' ? 'desc' : 'asc';
        ths.forEach(function (t) { delete t.dataset.dir; t.querySelector('.arrow') && t.querySelector('.arrow').remove(); });
        th.dataset.dir = dir;
        th.insertAdjacentHTML('beforeend', '<span class="arrow">' + (dir === 'asc' ? '▲' : '▼') + '</span>');
        rows.sort(function (a, b) {
          var av = a.children[col] ? a.children[col].textContent.trim() : '';
          var bv = b.children[col] ? b.children[col].textContent.trim() : '';
          var an = parseFloat(av.replace(/,/g, '')), bn = parseFloat(bv.replace(/,/g, ''));
          var cmp;
          if (!isNaN(an) && !isNaN(bn)) cmp = an - bn;
          else cmp = av.localeCompare(bv);
          return dir === 'asc' ? cmp : -cmp;
        });
        rows.forEach(function (r) { tbody.appendChild(r); });
      });
    });
  }

  /* ---------- modal ---------- */
  function openModal(title, bodyHTML, footerHTML) {
    closeModal();
    var root = document.getElementById('modalRoot');
    root.innerHTML =
      '<div class="modal-backdrop" id="mb">' +
      '  <div class="modal">' +
      '    <header><h3>' + U.esc(title) + '</h3><button class="x" id="modalX">✕</button></header>' +
      '    <div class="body" id="modalBody">' + bodyHTML + '</div>' +
      (footerHTML ? '<footer id="modalFooter">' + footerHTML + '</footer>' : '') +
      '  </div>' +
      '</div>';
    document.getElementById('modalX').onclick = closeModal;
    document.getElementById('mb').addEventListener('click', function (e) {
      if (e.target.id === 'mb') closeModal();
    });
    return root;
  }
  function closeModal() { document.getElementById('modalRoot').innerHTML = ''; }

  /* ============================================================
     TAB 1 — ORDER FORM
     ============================================================ */
  function renderOrders(root) {

      '    <datalist id="productList">' + products.map(function (p) { return '<option value="' + U.esc(p.product) + '">'; }).join('') + '</datalist></div>' +
      '  <div class="field"><label>Quantity *</label><input name="Quantity" type="number" min="1" step="1" required placeholder="0" /></div>' +

    root.querySelector('#orderForm').addEventListener('submit', async function (e) {

      '  <div class="field"><label>Category</label><select id="fCat"><option value="">All</option>' + options(cfg.CATEGORIES) + '</select></div>' +

      '  <div class="field"><label>To</label><input id="fTo" type="date"/></div>' +

      '<div class="tablewrap" id="ordersTableWrap"></div></div>'
    );
    root.appendChild(card);

          cat = card.querySelector('#fCat').value,

      var rows = d.orders.filter(function (o) {
